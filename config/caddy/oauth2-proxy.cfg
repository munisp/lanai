# =============================================================================
# oauth2-proxy Configuration — Keycloak OIDC Bridge for Caddy forward_auth
# =============================================================================
# oauth2-proxy sits between Caddy's forward_auth directive and Keycloak.
# Caddy sends every request to oauth2-proxy for validation.
# oauth2-proxy validates the OIDC token with Keycloak and returns:
#   - 202 Accepted + user headers (X-Auth-Request-User, X-Auth-Request-Email, etc.)
#   - 401/302 redirect to Keycloak login page
# =============================================================================

# Provider: Keycloak OIDC
provider = "keycloak-oidc"

# Keycloak OIDC discovery URL (replace realm name as needed)
oidc-issuer-url = "https://auth.${LANAI_DOMAIN}/realms/lanai"

# OAuth2 client credentials (registered in Keycloak)
client-id = "${KEYCLOAK_CLIENT_ID}"
client-secret = "${KEYCLOAK_CLIENT_SECRET}"

# Redirect URL — must match Keycloak client configuration
redirect-url = "https://admin.${LANAI_DOMAIN}/oauth2/callback"

# Cookie settings
cookie-name = "_lanai_auth"
cookie-secret = "${OAUTH2_PROXY_COOKIE_SECRET}"
cookie-secure = true
cookie-httponly = true
cookie-samesite = "lax"
cookie-expire = "24h"
cookie-refresh = "1h"

# Session storage — use Redis for distributed sessions
session-store-type = "redis"
redis-connection-url = "redis://redis:6379/1"

# Email domain restriction (empty = allow all authenticated users)
email-domain = "*"

# Allowed groups — only users with these Keycloak roles can access admin
allowed-group = "/lanai-admins,/lanai-advisors"

# Upstream — not used directly (Caddy handles routing), but required
upstream = "http://lanai-portal:3000/"

# Listen address for forward_auth requests from Caddy
http-address = "0.0.0.0:4180"

# Headers to pass to upstream after successful auth
set-xauthrequest = true
pass-access-token = true
pass-user-headers = true

# Keycloak-specific: extract groups from token
oidc-groups-claim = "groups"

# Skip auth for health check
skip-auth-route = "^/oauth2/health$"

# Logging
logging-filename = "/var/log/oauth2-proxy/access.log"
standard-logging = true
request-logging = true
auth-logging = true

# Metrics
metrics-address = "0.0.0.0:44180"

# TLS — terminate at Caddy, proxy talks plain HTTP internally
tls-cert-file = ""
tls-key-file = ""

# Skip provider button (go directly to Keycloak)
skip-provider-button = true

# Reverse proxy mode — critical for Caddy forward_auth
reverse-proxy = true
real-client-ip-header = "X-Real-IP"
