deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen: 9080
  enable_admin: true
  enable_dev_mode: false
  enable_reuseport: true
  enable_ipv6: false
  real_ip_header: X-Real-IP
  real_ip_recursive: true
  router:
    http: radixtree_host_uri
    ssl: radixtree_sni
  ssl:
    enable: false

# Every configured plugin below is shipped in the pinned APISIX image. Keycloak
# verification and Permify decisions are deliberately made by the portal, where
# resource IDs and user/member ownership are available to the policy layer.
plugins:
  - key-auth
  - cors
  - csrf
  - ip-restriction
  - limit-req
  - limit-conn
  - limit-count
  - proxy-rewrite
  - prometheus
  - request-id

plugin_attr:
  prometheus:
    export_uri: /apisix/prometheus/metrics
    metric_prefix: apisix_
    enable_export_server: true
    export_addr:
      ip: 0.0.0.0
      port: 9091

nginx_config:
  error_log: /dev/stderr
  error_log_level: warn
  worker_processes: auto
  worker_connections: 4096
  keepalive_timeout: 65
  client_max_body_size: 50m
  http_configuration_snippet: |
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;
    real_ip_recursive on;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
