# =============================================================================
# Apache APISIX Configuration — Lanai Platform API Gateway
# =============================================================================
# APISIX sits behind Caddy and handles:
#   - Fine-grained API routing
#   - OpenAppSec ML-based WAF (as external plugin runner)
#   - JWT validation with Keycloak JWKS public keys
#   - Permify authorization checks via ext-plugin
#   - Dapr sidecar integration
#   - Rate limiting per-route
#   - Observability (Prometheus, OpenTelemetry, Zipkin)
# =============================================================================

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
    health_check_timeout: 10
  admin:
    admin_key:
      - name: "admin"
        key: "${APISIX_ADMIN_KEY}"
        role: admin
      - name: "viewer"
        key: "${APISIX_VIEWER_KEY}"
        role: viewer
    allow_admin:
      - 127.0.0.0/24
      - 172.16.0.0/12

apisix:
  node_listen: 9080
  enable_admin: true
  enable_dev_mode: false
  enable_reuseport: true
  enable_ipv6: false

  # Trust Caddy's forwarded headers
  real_ip_header: "X-Real-IP"
  real_ip_recursive: true

  router:
    http: radixtree_host_uri
    ssl: radixtree_sni

  ssl:
    enable: false

plugins:
  # Authentication & Authorization
  - jwt-auth
  - key-auth
  - basic-auth
  - openid-connect
  - authz-keycloak

  # Security
  - cors
  - csrf
  - ip-restriction
  - ua-restriction
  - referer-restriction
  - consumer-restriction

  # Traffic management
  - limit-req
  - limit-conn
  - limit-count
  - traffic-split
  - proxy-rewrite
  - redirect

  # Observability
  - prometheus
  - zipkin
  - opentelemetry
  - http-logger
  - request-id

  # External plugins (OpenAppSec WAF + Permify authz)
  - ext-plugin-pre-req
  - ext-plugin-post-req

  # Response transformation
  - response-rewrite

plugin_attr:
  # -------------------------------------------------------------------------
  # Prometheus metrics — scraped by Grafana
  # -------------------------------------------------------------------------
  prometheus:
    export_uri: /apisix/prometheus/metrics
    metric_prefix: apisix_
    enable_export_server: true
    export_addr:
      ip: 0.0.0.0
      port: 9091

  # -------------------------------------------------------------------------
  # OpenTelemetry distributed tracing
  # -------------------------------------------------------------------------
  opentelemetry:
    trace_id_source: x-request-id
    resource:
      service.name: lanai-apisix
      service.version: "1.0.0"
      deployment.environment: production
    collector:
      address: otel-collector:4317
      request_timeout: 3

  # -------------------------------------------------------------------------
  # Zipkin tracing (fallback)
  # -------------------------------------------------------------------------
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
    sample_ratio: 0.1
    service_name: lanai-apisix

  # -------------------------------------------------------------------------
  # External Plugin Runner
  # Runs OpenAppSec ML WAF + Permify authorization as pre-request plugins
  # -------------------------------------------------------------------------
  ext-plugin-pre-req:
    cmd:
      - /usr/local/bin/lanai-ext-runner
    timeout: 5000
    keepalive: true

  # -------------------------------------------------------------------------
  # Keycloak OpenID Connect
  # -------------------------------------------------------------------------
  openid-connect:
    client_id: "${KEYCLOAK_CLIENT_ID}"
    client_secret: "${KEYCLOAK_CLIENT_SECRET}"
    discovery: "http://keycloak:8080/realms/lanai/.well-known/openid-configuration"
    scope: "openid profile email groups"
    bearer_only: true
    realm: lanai
    introspection_endpoint: "http://keycloak:8080/realms/lanai/protocol/openid-connect/token/introspect"
    introspection_endpoint_auth_method: "client_secret_post"

  # -------------------------------------------------------------------------
  # Keycloak Authorization (Permify-backed)
  # -------------------------------------------------------------------------
  authz-keycloak:
    token_endpoint: "http://keycloak:8080/realms/lanai/protocol/openid-connect/token"
    permissions:
      - "lanai-api:read"
      - "lanai-api:write"

nginx_config:
  error_log: /dev/stderr
  error_log_level: warn
  worker_processes: auto
  worker_connections: 1024
  keepalive_timeout: 65
  client_max_body_size: 50m
  http_configuration_snippet: |
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;
    real_ip_recursive on;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
