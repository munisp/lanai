# APISIX standalone declarative configuration.
# Authentication and object authorization are enforced by Keycloak and Permify in
# the portal; OpenAppSec is attached as a real reverse-proxy enforcement point.
upstreams:
  - id: lanai-portal
    type: roundrobin
    scheme: http
    nodes:
      "lanai-portal:3001": 1
    checks:
      active:
        type: http
        http_path: /api/health
        interval: 10
        timeout: 5
        healthy: { successes: 2 }
        unhealthy: { http_failures: 3 }

  - id: lanai-ai-gateway
    type: roundrobin
    scheme: http
    nodes:
      "lanai-ai-gateway:8100": 1

routes:
  - id: health
    name: health
    uri: /api/health
    methods: [GET]
    priority: 100
    upstream_id: lanai-portal
    plugins:
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  - id: oauth
    name: keycloak-oidc-entry-and-callback
    uri: /api/oauth/*
    methods: [GET]
    priority: 90
    upstream_id: lanai-portal
    plugins:
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      limit-count:
        count: 30
        time_window: 900
        key_type: var
        key: remote_addr
        rejected_code: 429

  - id: stripe-webhook
    name: stripe-webhook
    uri: /api/webhooks/stripe
    methods: [POST]
    priority: 90
    upstream_id: lanai-portal
    plugins:
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      limit-count:
        count: 100
        time_window: 60
        key_type: var
        key: remote_addr
        rejected_code: 429

  - id: chatwoot-webhook
    name: chatwoot-webhook
    uri: /api/webhooks/chatwoot
    methods: [POST]
    priority: 90
    upstream_id: lanai-portal
    plugins:
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  - id: ai-gateway-internal
    name: ai-gateway-internal
    uri: /internal/ai/*
    methods: [POST]
    priority: 80
    upstream_id: lanai-ai-gateway
    plugins:
      proxy-rewrite:
        regex_uri: ["^/internal/ai/(.*)", "/$1"]
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  - id: portal-api
    name: portal-api
    uri: /api/*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    priority: 10
    upstream_id: lanai-portal
    plugins:
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      limit-count:
        count: 300
        time_window: 900
        key_type: var
        key: remote_addr
        rejected_code: 429
      prometheus:
        prefer_name: true
