# OpenAppSec local declarative policy for the APISIX attachment deployment.
# The model operates in prevention-learning mode; request/response bodies are not logged.
policies:
  default:
    triggers:
      - lanai-security-log
    mode: prevent-learn
    practices:
      - lanai-api-protection
    custom-response: lanai-block-response
  specific-rules: []

practices:
  - name: lanai-api-protection
    openapi-schema-validation:
      configmap: []
      override-mode: prevent-learn
    snort-signatures:
      configmap: []
      override-mode: prevent-learn
    web-attacks:
      max-body-size-kb: 51200
      max-header-size-bytes: 65536
      max-object-depth: 30
      max-url-size-bytes: 8192
      minimum-confidence: high
      override-mode: prevent-learn
      protections:
        csrf-protection: inactive
        error-disclosure: inactive
        non-valid-http-methods: true
        open-redirect: inactive
    anti-bot:
      injected-URIs: []
      validated-URIs: []
      override-mode: prevent-learn

log-triggers:
  - name: lanai-security-log
    access-control-logging:
      allow-events: false
      drop-events: true
    additional-suspicious-events-logging:
      enabled: true
      minimum-severity: high
      response-body: false
    appsec-logging:
      all-web-requests: false
      detect-events: true
      prevent-events: true
    extended-logging:
      http-headers: false
      request-body: false
      url-path: false
      url-query: false
    log-destination:
      stdout:
        format: json

custom-responses:
  - name: lanai-block-response
    mode: response-code-only
    http-response-code: 403
