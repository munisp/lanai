# Namespace-scoped Dapr Components, equivalent to config/dapr/components/redis.yaml.
# Two changes from that file: (1) uses Dapr's native Kubernetes secret store
# (secretKeyRef) instead of the `{env:REDIS_PASSWORD}` self-hosted-mode
# syntax, since these run under the cluster's real Dapr control plane
# (namespace dapr-system), not a daprd process with that env set; (2) points
# at the cluster-wide shared Redis (namespace `redis`, not a lanai-local
# one) — state-store keys are auto-prefixed by app-id by Dapr, so this is
# safe to share with every other app on the cluster, but pub/sub topic names
# are NOT auto-namespaced, so make sure lanai's topic names can't collide
# with another app's.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-master.redis.svc.cluster.local:6379"
    - name: redisPassword
      secretKeyRef: { name: lanai-secrets, key: REDIS_PASSWORD }
    - name: enableTLS
      value: "false"
    - name: actorStateStore
      value: "true"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-master.redis.svc.cluster.local:6379"
    - name: redisPassword
      secretKeyRef: { name: lanai-secrets, key: REDIS_PASSWORD }
    - name: enableTLS
      value: "false"
