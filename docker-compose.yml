version: "3.9"

# ==============================================================================
# Lanai Lifestyle Platform — Full Stack Docker Compose
# ==============================================================================
# Services:
#   Core:       postgres, redis, lanai-portal
#   Auth:       keycloak
#   Authz:      permify
#   Messaging:  chatwoot, chatwoot-ai-bridge
#   CRM:        twenty-server, twenty-db
#   Gateway:    apisix, etcd
#   WAF:        openappsec
#   Finance:    tigerbeetle
#   Workflows:  temporal, temporal-ui
#   Streaming:  fluvio
#   Service Mesh: dapr-placement
# ==============================================================================

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  chatwoot_storage:
  twenty_db_data:
  tigerbeetle_data:
  temporal_data:
  apisix_data:
  etcd_data:
  permify_data:
  fluvio_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: lanai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lanai_password}
      POSTGRES_DB: lanai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanai -d lanai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5432:5432"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ── Keycloak (Identity & Access Management) ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/lanai
      KC_DB_USERNAME: lanai
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-lanai_password}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password}
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "8080:8080"

  # ── Permify (Fine-Grained Authorization) ──────────────────────────────────────
  permify:
    image: ghcr.io/permify/permify:latest
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://lanai:${POSTGRES_PASSWORD:-lanai_password}@postgres:5432/lanai?sslmode=disable
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: 20
    command: serve
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3476 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3476:3476"
      - "3478:3478"

  # ── TigerBeetle (Financial Ledger) ────────────────────────────────────────────
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - tigerbeetle_data:/data
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3000:3000"

  # ── etcd (required by APISIX) ─────────────────────────────────────────────────
  etcd:
    image: bitnami/etcd:3.5
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - etcd_data:/bitnami/etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "2379:2379"

  # ── APISIX (API Gateway) ──────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.0-debian
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - apisix_data:/usr/local/apisix/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "9080:9080"   # API gateway (HTTP)
      - "9443:9443"   # API gateway (HTTPS)
      - "9180:9180"   # Admin API

  # ── OpenAppSec (Web Application Firewall) ─────────────────────────────────────
  openappsec:
    image: openappsec/agent:latest
    restart: unless-stopped
    networks: [app-net]
    environment:
      TUNING_MODE: "true"
      registered_server: "Lanai Portal"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "8082:80"
      - "8443:443"

  # ── Temporal (Workflow Orchestration) ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: lanai
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-lanai_password}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3001"
    ports:
      - "8088:8080"

  # ── Fluvio (Event Streaming) ──────────────────────────────────────────────────
  fluvio:
    image: infinyon/fluvio:latest
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - fluvio_data:/var/lib/fluvio
    command: fluvio-run sc --local
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9003 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "9003:9003"
      - "9004:9004"

  # ── Dapr Placement Service (Service Mesh) ─────────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.13.0
    restart: unless-stopped
    networks: [app-net]
    command: ["./placement", "-port", "50005", "-log-level", "warn"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50005 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "50005:50005"

  # ── Chatwoot (Omnichannel Messaging) ──────────────────────────────────────────
  chatwoot:
    image: chatwoot/chatwoot:v3.10.0
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chatwoot_storage:/app/storage
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change_me_to_64_char_random_string_for_chatwoot}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3030}
      DEFAULT_LOCALE: en
      FORCE_SSL: "false"
      ENABLE_ACCOUNT_SIGNUP: "false"
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: lanai
      POSTGRES_USERNAME: lanai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lanai_password}
    command: bundle exec rails server -p 3000 -b 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "3030:3000"

  # ── Chatwoot AI Bridge (Python microservice) ──────────────────────────────────
  chatwoot-ai-bridge:
    build:
      context: ./lanai_ai/chatwoot_ai_bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [app-net]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5560/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "5560:5560"

  # ── Twenty CRM ────────────────────────────────────────────────────────────────
  twenty-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [app-net]
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: ${TWENTY_DB_PASSWORD:-twenty_password}
      POSTGRES_DB: twenty
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty"]
      interval: 10s
      timeout: 5s
      retries: 5

  twenty-server:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      twenty-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      PG_DATABASE_URL: postgres://twenty:${TWENTY_DB_PASSWORD:-twenty_password}@twenty-db:5432/twenty
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      SERVER_URL: ${TWENTY_SERVER_URL:-http://localhost:3002}
      FRONT_BASE_URL: ${TWENTY_FRONT_URL:-http://localhost:3001}
      SIGN_IN_PREFILLED: "true"
      STORAGE_TYPE: local
      MESSAGE_QUEUE_TYPE: bull-mq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "3002:3000"

  # ── Lanai Portal (Main Application) ──────────────────────────────────────────
  lanai-portal:
    build:
      context: ./lanai-portal
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://lanai:${POSTGRES_PASSWORD:-lanai_password}@postgres:5432/lanai
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_secret_in_production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-http://keycloak:8080}
      VITE_APP_ID: ${VITE_APP_ID:-lanai-portal}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Lanai Lifestyle <hello@lanailifestyle.com>}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      TWENTY_CRM_URL: http://twenty-server:3000
      TWENTY_CRM_API_TOKEN: ${TWENTY_CRM_API_TOKEN:-}
      CHATWOOT_URL: http://chatwoot:3000
      CHATWOOT_ACCESS_TOKEN: ${CHATWOOT_ACCESS_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      CHATWOOT_AI_BRIDGE_URL: http://chatwoot-ai-bridge:5560
      TEMPORAL_ADDRESS: temporal:7233
      PERMIFY_URL: http://permify:3476
      FLUVIO_ENDPOINT: fluvio:9003
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
      PORT: 3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "3001:3001"
