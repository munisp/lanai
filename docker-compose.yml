name: lanai

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  keycloak_import:
  caddy_data:
  caddy_config:
  tigerbeetle_data:
  fluvio_data:
  ollama_data:
  minio_data:
  nessie_data:
  prometheus_data:
  grafana_data:
  appsec_data:
  appsec_logs:

services:
  postgres:
    image: postgres:16.6-bookworm
    restart: unless-stopped
    networks: [app-net]
    environment:
      POSTGRES_USER: lanai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: lanai
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      TEMPORAL_DB_PASSWORD: ${TEMPORAL_DB_PASSWORD:?TEMPORAL_DB_PASSWORD is required}
      CHATWOOT_DB_PASSWORD: ${CHATWOOT_DB_PASSWORD:?CHATWOOT_DB_PASSWORD is required}
      PERMIFY_DB_PASSWORD: ${PERMIFY_DB_PASSWORD:?PERMIFY_DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanai -d lanai"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    networks: [app-net]
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is required}",
      ]
    volumes: [redis_data:/data]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  # config/keycloak/lanai-realm.json is a template — ${LANAI_DOMAIN}-style
  # placeholders in it are NOT substituted by Keycloak itself (a raw
  # bind-mount of the template previously made realm import fail outright:
  # "Invalid client lanai-portal: A redirect URI is not a valid URI"). This
  # renders it with envsubst into a shared volume that keycloak imports from
  # instead of the template directly.
  keycloak-realm-render:
    image: alpine:3.20
    restart: "no"
    networks: [app-net]
    environment:
      LANAI_DOMAIN: ${LANAI_DOMAIN:?LANAI_DOMAIN is required}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-unused-oauth2-proxy-secret}
      APISIX_KEYCLOAK_SECRET: ${APISIX_KEYCLOAK_SECRET:-unused-apisix-keycloak-secret}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - ./config/keycloak/lanai-realm.json:/template/lanai-realm.json:ro
      - keycloak_import:/out
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        apk add --no-cache gettext >/dev/null
        envsubst < /template/lanai-realm.json > /out/lanai-realm.json

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    networks: [app-net]
    command:
      [
        "start",
        "--import-realm",
        "--http-enabled=true",
        "--proxy-headers=xforwarded",
      ]
    depends_on:
      postgres: { condition: service_healthy }
      keycloak-realm-render: { condition: service_completed_successfully }
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      KC_HOSTNAME: auth.${LANAI_DOMAIN:?LANAI_DOMAIN is required}
      KC_HOSTNAME_STRICT: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
    volumes:
      - keycloak_import:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200' <&3",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 45s

  permify:
    image: ghcr.io/permify/permify:v1.7.0
    restart: unless-stopped
    networks: [app-net]
    command: ["serve"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://permify:${PERMIFY_DB_PASSWORD:?PERMIFY_DB_PASSWORD is required}@postgres:5432/permify?sslmode=disable
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3476/healthz >/dev/null 2>&1 || nc -z localhost 3478",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  caddy:
    build:
      context: ./config/caddy
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      apisix: { condition: service_healthy }
      lanai-portal: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    environment:
      LANAI_DOMAIN: ${LANAI_DOMAIN:?LANAI_DOMAIN is required}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  openappsec-agent:
    image: ghcr.io/openappsec/agent:latest
    restart: unless-stopped
    networks: [app-net]
    ipc: shareable
    environment:
      registered_server: Lanai-APISIX
    volumes:
      - ./config/openappsec/policy.yaml:/ext/appsec/local_policy.yaml:ro
      - appsec_data:/etc/cp/data
      - appsec_logs:/var/log/nano_agent
    command: ["/cp-nano-agent"]

  apisix:
    image: ghcr.io/openappsec/apisix-attachment:latest
    restart: unless-stopped
    networks: [app-net]
    ipc: service:openappsec-agent
    depends_on:
      openappsec-agent: { condition: service_started }
      lanai-portal: { condition: service_healthy }
      lanai-ai-gateway: { condition: service_healthy }
    environment:
      APISIX_STAND_ALONE: "true"
    volumes:
      - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./config/apisix/routes/lanai-routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9080/apisix/status"]
      interval: 10s
      timeout: 5s
      retries: 15

  dapr-placement:
    image: daprio/dapr:1.14.4
    restart: unless-stopped
    networks: [app-net]
    command: ["./placement", "-port", "50005", "-log-level", "warn"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50005"]
      interval: 10s
      timeout: 5s
      retries: 10

  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.9
    restart: "no"
    networks: [app-net]
    volumes: [tigerbeetle_data:/data]
    entrypoint: ["/bin/sh", "-ec"]
    command: >-
      test -f /data/0_0.tigerbeetle || tigerbeetle format --cluster=0 --replica=0 --replica-count=1 --development /data/0_0.tigerbeetle

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.17.9
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      tigerbeetle-init: { condition: service_completed_successfully }
    command:
      [
        "start",
        "--addresses=0.0.0.0:3000",
        "--cluster=0",
        "/data/0_0.tigerbeetle",
      ]
    volumes: [tigerbeetle_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000"]
      interval: 10s
      timeout: 5s
      retries: 15

  temporal:
    image: temporalio/auto-setup:1.26.2
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:?TEMPORAL_DB_PASSWORD is required}
      POSTGRES_DB: temporal
      POSTGRES_VISIBILITY_DB: temporal_visibility
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      temporal: { condition: service_healthy }
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: https://admin.${LANAI_DOMAIN:?LANAI_DOMAIN is required}

  fluvio:
    image: infinyon/fluvio:v0.14.9
    restart: unless-stopped
    networks: [app-net]
    command: ["fluvio-run", "sc", "--local"]
    volumes: [fluvio_data:/var/lib/fluvio]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9003"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    networks: [app-net]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    restart: "no"
    networks: [app-net]
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    entrypoint: ["/bin/sh", "-ec"]
    command: >-
      mc alias set lanai http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing lanai/lanai-lakehouse

  nessie:
    image: ghcr.io/projectnessie/nessie:0.103.2
    restart: unless-stopped
    networks: [app-net]
    environment:
      NESSIE_VERSION_STORE_TYPE: ROCKS
      NESSIE_VERSION_STORE_PERSIST_ROCKS_DATABASE_PATH: /var/lib/nessie
      QUARKUS_HTTP_PORT: 19120
    volumes: [nessie_data:/var/lib/nessie]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:19120/api/v2/config >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 15

  trino:
    image: trinodb/trino:461
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      minio-init: { condition: service_completed_successfully }
      nessie: { condition: service_healthy }
    volumes:
      - ./config/lakehouse/trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  lakehouse-ingest:
    build:
      context: ./lakehouse_ingest
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      trino: { condition: service_healthy }
    environment:
      TRINO_URL: http://trino:8080
      LAKEHOUSE_CATALOG: iceberg
      LAKEHOUSE_SCHEMA: lanai
      LAKEHOUSE_WAREHOUSE: s3://lanai-lakehouse/lanai
      LAKEHOUSE_INGEST_TOKEN: ${LAKEHOUSE_INGEST_TOKEN:?LAKEHOUSE_INGEST_TOKEN is required}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8200/health"]
      interval: 15s
      timeout: 5s
      retries: 15

  ollama:
    image: ollama/ollama:0.6.2
    restart: unless-stopped
    networks: [app-net]
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: 15m
    volumes: [ollama_data:/root/.ollama]
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-model-init:
    image: ollama/ollama:0.6.2
    restart: "no"
    networks: [app-net]
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-ec"]
    command: ollama pull "$${OLLAMA_MODEL}"

  lanai-ai-gateway:
    build:
      context: ./lanai_ai/gateway
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      ollama-model-init: { condition: service_completed_successfully }
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      AI_GATEWAY_TOKEN: ${AI_GATEWAY_TOKEN:?AI_GATEWAY_TOKEN is required}
      OLLAMA_NUM_THREADS: ${OLLAMA_NUM_THREADS:-4}
      OLLAMA_CONTEXT_WINDOW: ${OLLAMA_CONTEXT_WINDOW:-4096}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8100/health | grep -q model_ready",
        ]
      interval: 20s
      timeout: 5s
      retries: 20

  db-migrate:
    build:
      context: ./lanai-portal
    restart: "no"
    networks: [app-net]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://lanai:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/lanai
    command: ["node", "dist/migrate.js"]

  permify-bootstrap:
    build:
      context: ./lanai-portal
    restart: "no"
    networks: [app-net]
    depends_on:
      permify: { condition: service_healthy }
    environment:
      PERMIFY_GRPC_ADDRESS: permify:3478
      PERMIFY_TENANT_ID: lanai
      PERMIFY_INSECURE: "true"
      PERMIFY_SCHEMA_FILE: /app/config/permify-schema.perm
    volumes:
      - ./config/permify/schema.perm:/app/config/permify-schema.perm:ro
    command: ["node", "dist/permify-bootstrap.js"]

  lanai-portal:
    build:
      context: ./lanai-portal
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      db-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      keycloak: { condition: service_healthy }
      permify-bootstrap: { condition: service_completed_successfully }
      tigerbeetle: { condition: service_healthy }
      temporal: { condition: service_healthy }
      fluvio: { condition: service_healthy }
      lakehouse-ingest: { condition: service_healthy }
      lanai-ai-gateway: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://lanai:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/lanai
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      KEYCLOAK_REALM: lanai
      KEYCLOAK_ISSUER_URL: https://auth.${LANAI_DOMAIN:?LANAI_DOMAIN is required}/realms/lanai
      KEYCLOAK_INTERNAL_ISSUER_URL: http://keycloak:8080/realms/lanai
      KEYCLOAK_CLIENT_ID: lanai-portal
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      KEYCLOAK_REDIRECT_URI: https://${LANAI_DOMAIN:?LANAI_DOMAIN is required}/api/oauth/callback
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:?KEYCLOAK_ADMIN_CLIENT_ID is required}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:?KEYCLOAK_ADMIN_CLIENT_SECRET is required}
      PERMIFY_GRPC_ADDRESS: permify:3478
      PERMIFY_TENANT_ID: lanai
      PERMIFY_INSECURE: "true"
      TIGERBEETLE_ADDRESS: tigerbeetle:3000
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_LEDGER: "1"
      TIGERBEETLE_TRANSFER_CODE: "1"
      DAPR_HOST: 127.0.0.1
      DAPR_HTTP_PORT: "3500"
      DAPR_API_TOKEN: ${DAPR_API_TOKEN:?DAPR_API_TOKEN is required}
      DAPR_STATE_STORE: statestore
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: lanai-workflows
      FLUVIO_ENDPOINT: fluvio:9003
      AI_GATEWAY_URL: http://lanai-ai-gateway:8100
      AI_GATEWAY_TOKEN: ${AI_GATEWAY_TOKEN:?AI_GATEWAY_TOKEN is required}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      LAKEHOUSE_INGEST_URL: http://lakehouse-ingest:8200
      LAKEHOUSE_INGEST_TOKEN: ${LAKEHOUSE_INGEST_TOKEN:?LAKEHOUSE_INGEST_TOKEN is required}
      OPENAPPSEC_HEALTH_URL: http://apisix:9080/apisix/status
      APISIX_ADMIN_URL: http://apisix:9180
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY is required}
      ALLOWED_ORIGINS: https://${LANAI_DOMAIN:?LANAI_DOMAIN is required},https://member.${LANAI_DOMAIN:?LANAI_DOMAIN is required},https://admin.${LANAI_DOMAIN:?LANAI_DOMAIN is required}
      TWENTY_CRM_URL: ${TWENTY_CRM_URL:-}
      TWENTY_CRM_API_TOKEN: ${TWENTY_CRM_API_TOKEN:-}
      CHATWOOT_URL: ${CHATWOOT_URL:-}
      CHATWOOT_ACCESS_TOKEN: ${CHATWOOT_ACCESS_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 15

  lanai-portal-dapr:
    image: daprio/daprd:1.14.4
    restart: unless-stopped
    network_mode: service:lanai-portal
    depends_on:
      lanai-portal: { condition: service_started }
      dapr-placement: { condition: service_healthy }
      redis: { condition: service_healthy }
    command:
      [
        "./daprd",
        "-app-id",
        "lanai-portal",
        "-app-port",
        "3001",
        "-dapr-http-port",
        "3500",
        "-resources-path",
        "/components",
        "-placement-host-address",
        "dapr-placement:50005",
        "-enable-api-logging=false",
      ]
    volumes:
      - ./config/dapr/components:/components:ro
    environment:
      DAPR_API_TOKEN: ${DAPR_API_TOKEN:?DAPR_API_TOKEN is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  temporal-worker:
    build:
      context: ./lanai-portal
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      db-migrate: { condition: service_completed_successfully }
      temporal: { condition: service_healthy }
      lanai-ai-gateway: { condition: service_healthy }
    command: ["node", "dist/temporal-worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://lanai:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/lanai
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      KEYCLOAK_ISSUER_URL: https://auth.${LANAI_DOMAIN:?LANAI_DOMAIN is required}/realms/lanai
      KEYCLOAK_CLIENT_ID: lanai-portal
      PERMIFY_GRPC_ADDRESS: permify:3478
      PERMIFY_TENANT_ID: lanai
      PERMIFY_INSECURE: "true"
      TIGERBEETLE_ADDRESS: tigerbeetle:3000
      TIGERBEETLE_CLUSTER_ID: "0"
      DAPR_HOST: 127.0.0.1
      DAPR_HTTP_PORT: "3500"
      DAPR_API_TOKEN: ${DAPR_API_TOKEN:?DAPR_API_TOKEN is required}
      DAPR_STATE_STORE: statestore
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: lanai-workflows
      FLUVIO_ENDPOINT: fluvio:9003
      LAKEHOUSE_INGEST_URL: http://lakehouse-ingest:8200
      LAKEHOUSE_INGEST_TOKEN: ${LAKEHOUSE_INGEST_TOKEN:?LAKEHOUSE_INGEST_TOKEN is required}
      APISIX_ADMIN_URL: http://apisix:9180
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY is required}
      AI_GATEWAY_URL: http://lanai-ai-gateway:8100
      AI_GATEWAY_TOKEN: ${AI_GATEWAY_TOKEN:?AI_GATEWAY_TOKEN is required}

  temporal-worker-dapr:
    image: daprio/daprd:1.14.4
    restart: unless-stopped
    network_mode: service:temporal-worker
    depends_on:
      temporal-worker: { condition: service_started }
      dapr-placement: { condition: service_healthy }
      redis: { condition: service_healthy }
    command:
      [
        "./daprd",
        "-app-id",
        "temporal-worker",
        "-dapr-http-port",
        "3500",
        "-resources-path",
        "/components",
        "-placement-host-address",
        "dapr-placement:50005",
        "-enable-api-logging=false",
      ]
    volumes:
      - ./config/dapr/components:/components:ro
    environment:
      DAPR_API_TOKEN: ${DAPR_API_TOKEN:?DAPR_API_TOKEN is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    networks: [app-net]
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/prometheus",
        "--storage.tsdb.retention.time=30d",
      ]
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      prometheus: { condition: service_started }
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: https://admin.${LANAI_DOMAIN:?LANAI_DOMAIN is required}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes: [grafana_data:/var/lib/grafana]
