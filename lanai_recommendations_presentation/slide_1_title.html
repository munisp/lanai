<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #0B132B; 
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .content-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }
        .decorative-line {
            position: absolute;
            left: 100px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #D97757, transparent);
            opacity: 0.5;
        }
        .monogram-large {
            font-family: 'Space Mono', monospace;
            font-size: 120px;
            font-weight: 700;
            color: rgba(217, 119, 87, 0.1);
            position: absolute;
            right: -20px;
            bottom: -40px;
            line-height: 1;
        }
        .title-block {
            margin-left: 60px; /* Offset from the decorative line */
            max-width: 900px;
        }
        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }
        .accent-bar {
            width: 80px;
            height: 4px;
            background-color: #D97757;
            margin-bottom: 32px;
        }
        h2 {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 300;
            color: #E2E8F0;
            line-height: 1.5;
            max-width: 800px;
        }
        .footer {
            position: absolute;
            bottom: 60px;
            left: 160px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: #3182CE;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .geometric-shape {
            position: absolute;
            right: 100px;
            top: 150px;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(49, 130, 206, 0.3);
            border-radius: 50%;
        }
        .geometric-shape::after {
            content: '';
            position: absolute;
            right: -50px;
            bottom: -50px;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(217, 119, 87, 0.3);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="decorative-line"></div>
        <div class="geometric-shape"></div>
        <div class="monogram-large">LANAI</div>
        
        <div class="content-wrapper">
            <div class="title-block">
                <h1>The Intelligence Layer</h1>
                <div class="accent-bar"></div>
                <h2>Recommended Improvements, Enhancements & AI/LLM Innovations for Lanai Lifestyle</h2>
            </div>
        </div>
        
        <div class="footer">
            Confidential — Prepared for Lanai Lifestyle Leadership
        </div>
    </div>
</body>
</html>
